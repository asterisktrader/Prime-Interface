<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Prime.css">
</head>
<body>
     <div class="nav-prime">
        <div class="profile">
            <div class="profile-photo">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <div class="search-icon av">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="home-icon av">
                <i class="fa-regular fa-house"></i>
            </div>
            <div class="cast-icon av">
                <i class="fa-brands fa-chromecast"></i>
            </div>
            <div class="download-icon av">
                <i class="fa-solid fa-download"></i>
            </div>
            <div class="settiing-icon av">
                <i class="fa-solid fa-gear"></i>
            </div>
        </div> 

        <div class="text">
            <div class="text-one"><p>#1 in the US</p></div>
            <div class="text-two"><p>Amazon Original</p></div>
            <div class="text-three"><p>The Terminal List</p></div>
            <div class="text-four"><p>Navy SEAL Commander James Reece turns to vengeance as he investigates the mysterious forces behind the murder o...</p></div>
            <div class="text-five">
                <i class="fa-solid fa-circle-check"></i>
                <a>Included with Prime</a>
                <p>18+</p>
            </div>
            <div class="text-six">
                <i class="fa-solid fa-circle-play"></i>
                <p>Resume S1 E2</p>
                <div class="watchlist">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <div class="info">
                    <i class="fa-solid fa-circle-info"></i>
                </div>
            </div>
        </div>
        <div class="mode">
            <div id="content"><a>ALL</a></div>
            <div id="content"><a>Movies</a></div>
            <div id="content"><a>Series</a></div>
            <div id="content"><a>Shows</a></div>
            <div id="content"><a>Sports</a></div>
        </div>

        <div class="continue">
            <p>Continue Watching</p>
        </div>

        <div class="watching">
            <div class="box1 box" style="background-image: url(box1.img);"></div>
            <div class="box2 box" style="background-image: url(box2.img);"></div>
            <div class="box3 box" style="background-image: url(box3.img);"></div>
            <div class="box4 box" style="background-image: url(box4.img);"></div>
        </div>
     </div>
</body>
</html>
